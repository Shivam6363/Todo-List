<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .todo-container {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #task-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #task-input:focus {
            border-color: #4a90e2;
        }

        #add-btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        #add-btn:hover {
            background-color: #357abd;
        }

        ul {
            list-style: none;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #4a90e2;
            transition: all 0.3s ease;
        }

        li.completed {
            border-left-color: #2ecc71;
            opacity: 0.6;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: #7f8c8d;
        }

        .task-text {
            flex: 1;
            cursor: pointer;
            font-size: 16px;
            color: #2c3e50;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>My Tasks</h2>
        
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off">
            <button id="add-btn">Add</button>
        </div>

        <ul id="task-list"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');

        // Load tasks from local storage when the app starts
        document.addEventListener('DOMContentLoaded', loadTasks);

        // Function to add a task
        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === '') return;

            createTaskElement(taskText, false);
            saveTasks();

            taskInput.value = '';
            taskInput.focus();
        }

        // Helper function to build the DOM elements for a task
        function createTaskElement(text, isCompleted) {
            const li = document.createElement('li');
            if (isCompleted) li.classList.add('completed');
            
            const span = document.createElement('span');
            span.classList.add('task-text');
            span.innerText = text;
            
            span.addEventListener('click', () => {
                li.classList.toggle('completed');
                saveTasks(); // Resave state when completed toggles
            });

            const deleteBtn = document.createElement('button');
            deleteBtn.classList.add('delete-btn');
            deleteBtn.innerHTML = '&times;';
            
            deleteBtn.addEventListener('click', () => {
                li.remove();
                saveTasks(); // Resave state when item is deleted
            });

            li.appendChild(span);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);
        }

        // Save entire list to Local Storage
        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('#task-list li').forEach(li => {
                tasks.push({
                    text: li.querySelector('.task-text').innerText,
                    completed: li.classList.contains('completed')
                });
            });
            localStorage.setItem('myTodoList', JSON.stringify(tasks));
        }

        // Load and render tasks from Local Storage
        function loadTasks() {
            const savedTasks = JSON.parse(localStorage.getItem('myTodoList')) || [];
            savedTasks.forEach(task => {
                createTaskElement(task.text, task.completed);
            });
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
